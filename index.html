

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JOHN'S RETRO ARCADE</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="arcade-container">
        <header>
            <h1>★ JOHN'S RETRO ARCADE ★</h1>
            <p class="subtitle">INSERT COIN TO SELECT A GAME</p>
        </header>

        <main id="screen-area">
            <div id="menu-screen">
                <h2>SELECT GAME</h2>
                <div class="menu-buttons">
                    <button class="menu-btn" onclick="switchGame('invaders')">
                        <span class="btn-icon">👾</span> SPACE INVADERS
                    </button>
                    <button class="menu-btn" onclick="switchGame('breakout')">
                        <span class="btn-icon">🧱</span> BLOCK BREAKOUT
                    </button>
                    <button class="menu-btn" onclick="switchGame('snake')">
                        <span class="btn-icon">🐍</span> RETRO SNAKE
                    </button>
                </div>
            </div>

            <div id="game-screen" style="display: none;">
                <div id="game-header">
                    <span id="game-title">GAME</span>
                    <span id="score-display">SCORE: 0</span>
                </div>
                <canvas id="gameCanvas" width="600" height="400"></canvas>
                <div class="controls-guide">
                    <p id="controls-text">操作方法</p>
                </div>
                <button class="back-btn" onclick="backToMenu()">BACK TO MENU</button>
            </div>
        </main>

        <footer>
            <div class="joystick-panel">
                <div class="joystick"></div>
                <div class="action-buttons">
                    <div class="act-btn red"></div>
                    <div class="act-btn green"></div>
                </div>
            </div>
            <p class="copyright">© 2026 RETRO ARCADE STUDIO</p>
        </footer>
    </div>
    <script src="game.js"></script>
</body>
</html>
